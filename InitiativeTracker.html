<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Carbon 2185 — Initiative Tracker</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body { background: #080b0f; }
    #root { min-height: 100vh; }
    input[type=number]::-webkit-inner-spin-button,
    input[type=number]::-webkit-outer-spin-button { -webkit-appearance: none; margin: 0; }
    input[type=number] { -moz-appearance: textfield; }
  </style>
</head>
<body>
  <div id="root"></div>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/react/18.2.0/umd/react.production.min.js"></script>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/react-dom/18.2.0/umd/react-dom.production.min.js"></script>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/babel-standalone/7.23.2/babel.min.js"></script>
  <script type="text/babel">
    const { useState, useMemo, useEffect, useRef } = React;

    const LS_KEY    = "carbon2185_state";
    const ME_KEY    = "carbon2185_me";
    const IS_PLAYER = new URLSearchParams(window.location.search).get("view") === "player";
    const IN_IFRAME = (() => { try { return window.self !== window.top; } catch(e) { return true; } })();

    const PRESET_CONDITIONS = [
      { name:"Aturdido",     color:"#FFD700" }, { name:"Quemado",      color:"#FF4500" },
      { name:"Hackeado",     color:"#00FF41" }, { name:"Paralizado",   color:"#9400D3" },
      { name:"Sangrando",    color:"#DC143C" }, { name:"Sobrecargado", color:"#00BFFF" },
      { name:"Cegado",       color:"#888888" }, { name:"Marcado",      color:"#FF00FF" },
      { name:"EMP",          color:"#FF8C00" }, { name:"Infectado",    color:"#7FFF00" },
    ];

    const NEON = {
      green:"#00FF41", cyan:"#00BFFF", magenta:"#FF00FF",
      gold:"#FFD700",  red:"#FF4136",  orange:"#FF8C00",
      bg:"#080b0f",    bgCard:"#0d1117", bgInput:"#111820",
      text:"#b0c4b0",  dim:"#4a5a4a",
    };

    const S = {
      btn:   (c) => ({ background:"transparent", border:"1px solid "+c, color:c, fontFamily:"inherit", fontSize:12, letterSpacing:1, padding:"5px 12px", borderRadius:3, cursor:"pointer", transition:"all 0.15s" }),
      btnSm: (c) => ({ background:"transparent", border:"1px solid "+c+"55", color:c, fontFamily:"inherit", fontSize:11, padding:"2px 7px", borderRadius:3, cursor:"pointer", lineHeight:"16px" }),
      input: { background:"#111820", border:"1px solid #00FF4133", borderRadius:3, color:"#00FF41", fontFamily:"inherit", fontSize:13, padding:"5px 8px", outline:"none", width:"100%", boxSizing:"border-box" },
      select:{ background:"#111820", border:"1px solid #00FF4133", borderRadius:3, color:"#00FF41", fontFamily:"inherit", fontSize:13, padding:"5px 8px", outline:"none", cursor:"pointer" },
      tag:   (c) => ({ display:"inline-flex", alignItems:"center", gap:4, background:c+"18", border:"1px solid "+c+"66", borderRadius:3, color:c, fontSize:10, letterSpacing:1, padding:"1px 6px", marginRight:4, marginBottom:3, whiteSpace:"nowrap" }),
      card:  { background:"#0d1117", border:"1px solid #00FF4133", borderRadius:6, padding:16, marginBottom:16 },
      sec:   { color:"#00BFFF", fontSize:11, letterSpacing:3, textTransform:"uppercase", marginBottom:12, borderBottom:"1px solid #00BFFF22", paddingBottom:6 },
    };

    const uid = () => Math.random().toString(36).substr(2, 9);

    const makeCharacter = (name, type, initiative, hp) => ({
      id: uid(), name: name.trim(), type,
      initiative: Number(initiative) || 0,
      hp:    type === "NPC" ? (Number(hp) || 10) : null,
      maxHp: type === "NPC" ? (Number(hp) || 10) : null,
      conditions: [],
    });

    const makeCondition = (name, color, duration, reducesAt) => ({
      id: uid(), name, color,
      duration: duration === 0 ? null : Number(duration),
      reducesAt,
    });

    const loadState = () => { try { return JSON.parse(localStorage.getItem(LS_KEY)) || null; } catch(e) { return null; } };
    const saveState = (s) => localStorage.setItem(LS_KEY, JSON.stringify(s));

    const hpEmoji = (char) => {
      if (char.hp === null || char.hp === undefined || !char.maxHp) return null;
      const pct = (char.hp / char.maxHp) * 100;
      if (pct < 5)  return { icon:"😵", title:"Al borde de la muerte" };
      if (pct < 25) return { icon:"🤒", title:"Estado critico" };
      if (pct < 50) return { icon:"😟", title:"Herido" };
      if (pct < 75) return { icon:"😐", title:"Golpeado" };
      return           { icon:"😊", title:"Sin dano significativo" };
    };

    /* ══════════════════════════════════════
       PLAYER VIEW
    ══════════════════════════════════════ */
    function PlayerView() {
      const [state,       setState]       = useState(() => loadState() || { characters:[], activeCharId:null, round:1 });
      const [meId,        setMeId]        = useState(() => { if (IN_IFRAME) { localStorage.removeItem(ME_KEY); return null; } return localStorage.getItem(ME_KEY); });
      const [initVal,     setInitVal]     = useState("");
      const [hpVal,       setHpVal]       = useState("");
      const [maxHpVal,    setMaxHpVal]    = useState("");
      const [editingInit, setEditingInit] = useState(false);
      const [editingHp,   setEditingHp]   = useState(false);

      useEffect(() => {
        const sync = () => { const n = loadState(); if (n) setState(n); };
        const onStor = (e) => { if (e.key === LS_KEY) sync(); };
        window.addEventListener("storage", onStor);
        const poll = setInterval(sync, 800);
        return () => { window.removeEventListener("storage", onStor); clearInterval(poll); };
      }, []);

      const myChar = state.characters.find(c => c.id === meId);

      useEffect(() => {
        if (!myChar) return;
        if (!editingInit) setInitVal(String(myChar.initiative ?? 0));
        if (!editingHp) {
          setHpVal(myChar.hp !== null ? String(myChar.hp) : "");
          setMaxHpVal(myChar.maxHp !== null ? String(myChar.maxHp) : "");
        }
      }, [myChar && myChar.id, myChar && myChar.initiative, myChar && myChar.hp, myChar && myChar.maxHp]);

      const updateMe = (updates) => {
        const cur = loadState();
        if (!cur) return;
        saveState({ ...cur, characters: cur.characters.map(c => c.id === meId ? { ...c, ...updates } : c) });
      };

      const selectMe = (char) => {
        localStorage.setItem(ME_KEY, char.id);
        setMeId(char.id);
        setInitVal(String(char.initiative ?? 0));
        setHpVal(char.hp !== null ? String(char.hp) : "");
        setMaxHpVal(char.maxHp !== null ? String(char.maxHp) : "");
      };

      const clearMe = () => { localStorage.removeItem(ME_KEY); setMeId(null); };

      const commitInit = () => {
        const v = parseInt(initVal) || 0;
        setInitVal(String(v));
        updateMe({ initiative: v });
        setEditingInit(false);
      };

      const commitHP = () => {
        const maxHp = parseInt(maxHpVal) || 10;
        const hp    = Math.max(0, Math.min(maxHp, parseInt(hpVal) || 0));
        setHpVal(String(hp));
        setMaxHpVal(String(maxHp));
        updateMe({ hp, maxHp });
        setEditingHp(false);
      };

      const hpDelta = (d) => {
        if (!myChar || myChar.maxHp === null) return;
        const next = Math.max(0, Math.min(myChar.maxHp, (myChar.hp ?? 0) + d));
        setHpVal(String(next));
        updateMe({ hp: next });
      };

      const { characters, activeCharId, round } = state;
      const sorted     = [...characters].sort((a, b) => b.initiative - a.initiative);
      const activeChar = sorted.find(c => c.id === activeCharId) || null;
      const pcs        = sorted.filter(c => c.type === "PC");

      /* — Selector screen — */
      if (!meId || !myChar) {
        return (
          <div style={{ minHeight:"100vh", background:"#080b0f", color:"#b0c4b0", fontFamily:"'Courier New',monospace", display:"flex", flexDirection:"column" }}>
            {!IN_IFRAME && (
              <div style={{ background:"#050709", borderBottom:"1px solid #00FF4133", padding:"16px 32px", display:"flex", alignItems:"center", justifyContent:"space-between" }}>
                <div style={{ color:"#00FF41", fontSize:18, fontWeight:"bold", letterSpacing:4 }}>{"◈"} CARBON 2185</div>
                <span style={{ border:"1px solid #00FF4144", borderRadius:3, padding:"3px 10px", color:"#4a5a4a", fontSize:10, letterSpacing:2 }}>VISTA JUGADORES</span>
              </div>
            )}
            <div style={{ flex:1, display:"flex", flexDirection:"column", alignItems:"center", justifyContent:"center", padding:"2rem" }}>
              <div style={{ color:"#00BFFF", fontSize:11, letterSpacing:4, textTransform:"uppercase", marginBottom:24 }}>{">"} Identificate para ingresar tu data</div>
              {pcs.length === 0 ? (
                <div style={{ color:"#4a5a4a", fontSize:13, letterSpacing:2, textAlign:"center" }}>[ Esperando que el DJ agregue combatientes... ]</div>
              ) : (
                <div style={{ display:"flex", flexDirection:"column", gap:12, width:"100%", maxWidth:320 }}>
                  {pcs.map(pc => (
                    <button key={pc.id} onClick={() => selectMe(pc)}
                      style={{ ...S.btn("#00BFFF"), fontSize:14, padding:"12px 20px", letterSpacing:2 }}>
                      {"▷"} {pc.name}
                    </button>
                  ))}
                </div>
              )}
              <div style={{ marginTop:32, color:"#4a5a4a", fontSize:10, letterSpacing:2 }}>Solo visible para ti.</div>
            </div>
          </div>
        );
      }

      /* — Main player view — */
      const hpPct   = myChar.maxHp ? Math.max(0, Math.min(100, (myChar.hp / myChar.maxHp) * 100)) : 0;
      const hpColor = hpPct > 50 ? "#00FF41" : hpPct > 25 ? "#FFD700" : "#FF4136";
      const myEmoji = hpEmoji(myChar);

      return (
        <div style={{ minHeight:"100vh", background:"#080b0f", color:"#b0c4b0", fontFamily:"'Courier New',monospace", display:"flex", flexDirection:"column" }}>

          {!IN_IFRAME && (
            <div style={{ background:"#050709", borderBottom:"1px solid #00FF4133", padding:"14px 24px", display:"flex", alignItems:"center", justifyContent:"space-between", flexWrap:"wrap", gap:8 }}>
              <div style={{ display:"flex", alignItems:"center", gap:16 }}>
                <div style={{ color:"#00FF41", fontSize:16, fontWeight:"bold", letterSpacing:3 }}>{"◈"} CARBON 2185</div>
                <span style={{ color:"#00BFFF", fontSize:13, letterSpacing:2, borderLeft:"1px solid #00FF4133", paddingLeft:16 }}>{myChar.name}</span>
              </div>
              <div style={{ display:"flex", alignItems:"center", gap:12 }}>
                <span style={{ color:"#4a5a4a", fontSize:11, letterSpacing:2 }}>RONDA <span style={{ color:"#00FF41" }}>{String(round).padStart(3,"0")}</span></span>
                <button onClick={clearMe} style={{ ...S.btnSm("#4a5a4a"), fontSize:10 }}>{"↩"} Cambiar</button>
              </div>
            </div>
          )}

          {activeChar && (
            <div style={{ background:"#00FF4108", borderBottom:"1px solid #00FF4133", padding:"10px 24px", display:"flex", alignItems:"center", gap:12 }}>
              <span style={{ color:"#4a5a4a", fontSize:10, letterSpacing:2 }}>TURNO DE</span>
              <span style={{ color:"#00FF41", fontSize:18, fontWeight:"bold", letterSpacing:3 }}>{activeChar.name}</span>
              <span style={{ fontSize:9, letterSpacing:1, color:activeChar.type==="PC"?"#00BFFF":"#FF00FF", border:"1px solid "+( activeChar.type==="PC"?"#00BFFF44":"#FF00FF44"), borderRadius:2, padding:"2px 6px" }}>
                {activeChar.type === "PC" ? "JUGADOR" : "ENEMIGO"}
              </span>
            </div>
          )}

          <div style={{ flex:1, padding:"20px 24px", maxWidth:760, margin:"0 auto", width:"100%" }}>

            <div style={{ background:"#0a1020", border:"1px solid #00BFFF33", borderRadius:8, padding:20, marginBottom:20 }}>
              <div style={{ color:"#00BFFF", fontSize:11, letterSpacing:3, textTransform:"uppercase", marginBottom:16, paddingBottom:8, borderBottom:"1px solid #00BFFF22" }}>
                {"⬡"} Mi estado — {myChar.name}
              </div>
              <div style={{ display:"grid", gridTemplateColumns:"1fr 1fr", gap:16 }}>

                <div>
                  <div style={{ color:"#4a5a4a", fontSize:10, letterSpacing:2, marginBottom:8 }}>INICIATIVA</div>
                  <div style={{ display:"flex", alignItems:"center", gap:8 }}>
                    <button style={{ ...S.btn("#4a5a4a"), padding:"8px 14px", fontSize:16, lineHeight:1 }}
                      onClick={() => { const v = Math.max(-20, parseInt(initVal||"0")-1); setInitVal(String(v)); updateMe({initiative:v}); }}>{"−"}</button>
                    <input type="number" value={initVal}
                      onChange={e => { setInitVal(e.target.value); setEditingInit(true); }}
                      onFocus={() => setEditingInit(true)}
                      onBlur={commitInit}
                      onKeyDown={e => e.key==="Enter" && commitInit()}
                      style={{ ...S.input, textAlign:"center", fontSize:24, fontWeight:"bold", color:"#FFD700", padding:"8px", width:80 }} />
                    <button style={{ ...S.btn("#4a5a4a"), padding:"8px 14px", fontSize:16, lineHeight:1 }}
                      onClick={() => { const v = Math.min(30, parseInt(initVal||"0")+1); setInitVal(String(v)); updateMe({initiative:v}); }}>{"+"}</button>
                    <button style={{ ...S.btn("#00FF41"), padding:"8px 12px", fontSize:11 }} onClick={commitInit}>{"◈"} OK</button>
                  </div>
                </div>

                <div>
                  <div style={{ color:"#4a5a4a", fontSize:10, letterSpacing:2, marginBottom:8 }}>
                    PUNTOS DE VIDA
                    {myEmoji && <span style={{ marginLeft:8, fontSize:16 }} title={myEmoji.title}>{myEmoji.icon}</span>}
                  </div>
                  <div style={{ display:"flex", alignItems:"center", gap:6, marginBottom:8 }}>
                    <button style={{ ...S.btn("#FF4136"), padding:"8px 12px", fontSize:16, lineHeight:1 }} onClick={() => hpDelta(-1)}>{"−"}</button>
                    <input type="number" value={hpVal} placeholder="HP"
                      onChange={e => { setHpVal(e.target.value); setEditingHp(true); }}
                      onFocus={() => setEditingHp(true)}
                      onBlur={commitHP}
                      onKeyDown={e => e.key==="Enter" && commitHP()}
                      style={{ ...S.input, textAlign:"center", fontSize:20, fontWeight:"bold", color:myChar.hp !== null ? hpColor : "#4a5a4a", padding:"8px", width:65 }} />
                    <span style={{ color:"#4a5a4a", fontSize:14 }}>/</span>
                    <input type="number" value={maxHpVal} placeholder="MAX"
                      onChange={e => { setMaxHpVal(e.target.value); setEditingHp(true); }}
                      onFocus={() => setEditingHp(true)}
                      onBlur={commitHP}
                      onKeyDown={e => e.key==="Enter" && commitHP()}
                      style={{ ...S.input, textAlign:"center", fontSize:14, color:"#00BFFF", padding:"8px", width:58 }} />
                    <button style={{ ...S.btn("#00FF41"), padding:"8px 12px", fontSize:16, lineHeight:1 }} onClick={() => hpDelta(1)}>{"+"}</button>
                  </div>
                  {myChar.maxHp !== null && (
                    <div style={{ height:4, background:"#1a1a1a", borderRadius:2, overflow:"hidden" }}>
                      <div style={{ width:hpPct+"%", height:"100%", background:hpColor, transition:"all 0.4s" }} />
                    </div>
                  )}
                </div>

              </div>
            </div>

            <div style={{ background:"#0d1117", border:"1px solid #00FF4133", borderRadius:6, padding:16 }}>
              <div style={{ color:"#00BFFF", fontSize:11, letterSpacing:3, textTransform:"uppercase", marginBottom:12, borderBottom:"1px solid #00BFFF22", paddingBottom:6 }}>
                — ORDEN DE INICIATIVA —
              </div>
              {sorted.length === 0 ? (
                <div style={{ color:"#4a5a4a", textAlign:"center", padding:"20px 0", fontSize:12, letterSpacing:2 }}>[ SIN COMBATIENTES ]</div>
              ) : sorted.map((char, i) => {
                const isActive = char.id === activeCharId;
                const isMe     = char.id === meId;
                const emoji    = hpEmoji(char);
                return (
                  <div key={char.id} style={{ background:isActive?"#00FF410d":isMe?"#00BFFF06":"#0a0f0a", border:"1px solid "+(isActive?"#00FF41":isMe?"#00BFFF44":"#00FF411a"), borderRadius:6, padding:"12px 18px", marginBottom:8, position:"relative" }}>
                    {isActive && <div style={{ position:"absolute", left:0, top:0, bottom:0, width:4, background:"#00FF41", borderRadius:"6px 0 0 6px" }} />}
                    {!isActive && isMe && <div style={{ position:"absolute", left:0, top:0, bottom:0, width:4, background:"#00BFFF", borderRadius:"6px 0 0 6px", opacity:0.5 }} />}
                    <div style={{ display:"flex", alignItems:"center", gap:14 }}>
                      <span style={{ color:"#4a5a4a", fontSize:12, minWidth:22, textAlign:"right" }}>{"#"+(i+1)}</span>
                      <span style={{ color:isActive?"#FFD700":"#FFD70099", fontSize:26, fontWeight:"bold", minWidth:48, textAlign:"center" }}>{char.initiative}</span>
                      <div style={{ flex:1 }}>
                        <div style={{ display:"flex", alignItems:"center", gap:8 }}>
                          <span style={{ color:isActive?"#00FF41":isMe?"#00BFFF":"#b0c4b0", fontSize:17, fontWeight:isActive?"bold":"normal", letterSpacing:1 }}>
                            {char.name}
                            {isMe && <span style={{ color:"#00BFFF", fontSize:10, letterSpacing:2, marginLeft:8 }}>[TU]</span>}
                          </span>
                          <span style={{ fontSize:9, letterSpacing:1, color:char.type==="PC"?"#00BFFF":"#FF00FF", border:"1px solid "+(char.type==="PC"?"#00BFFF44":"#FF00FF44"), borderRadius:2, padding:"1px 5px" }}>
                            {char.type === "PC" ? "PJ" : "PNJ"}
                          </span>
                        </div>
                        {char.conditions.length > 0 && (
                          <div style={{ display:"flex", flexWrap:"wrap", marginTop:4 }}>
                            {char.conditions.map(cond => (
                              <span key={cond.id} style={S.tag(cond.color)}>
                                {cond.name}{cond.duration !== null && <span style={{ opacity:0.6 }}> {cond.duration}t</span>}
                              </span>
                            ))}
                          </div>
                        )}
                      </div>
                      {emoji && <span title={emoji.title} style={{ fontSize:24, lineHeight:1 }}>{emoji.icon}</span>}
                      {isActive && <div style={{ color:"#00FF41", fontSize:16 }}>{"▶"}</div>}
                    </div>
                  </div>
                );
              })}
            </div>
          </div>

          <div style={{ borderTop:"1px solid #00FF4111", padding:"10px 24px", color:"#4a5a4a", fontSize:10, letterSpacing:2, textAlign:"center" }}>
            CARBON 2185 // INITIATIVE TRACKER // SYNC AUTOMATICO
          </div>
        </div>
      );
    }

    /* ══════════════════════════════════════
       CHAR ROW
    ══════════════════════════════════════ */
    function CharRow({ char, isActive, rank, updateChar, updateHpDelta, updateHpDirect, removeCharacter, removeCondition, setCondModal }) {
      const [editInit, setEditInit] = useState(false);
      const [initVal,  setInitVal]  = useState(String(char.initiative));
      const [editHp,   setEditHp]   = useState(false);
      const [hpVal,    setHpVal]    = useState(String(char.hp ?? ""));

      const hasHp   = char.hp !== null && char.hp !== undefined;
      const hpPct   = (hasHp && char.maxHp) ? Math.max(0, (char.hp / char.maxHp)*100) : 100;
      const hpColor = hpPct > 50 ? "#00FF41" : hpPct > 25 ? "#FFD700" : "#FF4136";
      const emoji   = hpEmoji(char);

      useEffect(() => { if (!editHp) setHpVal(String(char.hp ?? "")); }, [char.hp]);

      const commitHp = () => {
        const v = parseInt(hpVal, 10);
        if (!isNaN(v)) updateHpDirect(char.id, Math.max(0, Math.min(char.maxHp ?? v, v)));
        setEditHp(false);
      };

      return (
        <div style={{ background:isActive?"#00FF410a":"#0a0f0a", border:"1px solid "+(isActive?"#00FF41":"#00FF4122"), borderRadius:5, padding:"10px 14px", marginBottom:8, position:"relative", transition:"all 0.2s" }}>
          {isActive && <div style={{ position:"absolute", left:0, top:0, bottom:0, width:3, background:"#00FF41", borderRadius:"5px 0 0 5px" }} />}
          <div style={{ display:"flex", alignItems:"center", gap:10 }}>
            <span style={{ color:"#4a5a4a", fontSize:11, minWidth:18 }}>{"#"+(rank+1)}</span>
            {editInit ? (
              <input autoFocus style={{ ...S.input, width:46, textAlign:"center", fontSize:16, color:"#FFD700" }}
                value={initVal}
                onChange={e => setInitVal(e.target.value)}
                onBlur={() => { updateChar(char.id, {initiative:Number(initVal)||0}); setEditInit(false); }}
                onKeyDown={e => { if(e.key==="Enter"){ updateChar(char.id,{initiative:Number(initVal)||0}); setEditInit(false); } if(e.key==="Escape") setEditInit(false); }} />
            ) : (
              <span onClick={() => { setEditInit(true); setInitVal(String(char.initiative)); }}
                title="Clic para editar" style={{ color:"#FFD700", fontSize:18, fontWeight:"bold", minWidth:46, textAlign:"center", cursor:"pointer" }}>
                {char.initiative}
              </span>
            )}
            <div style={{ flex:1 }}>
              <div style={{ display:"flex", alignItems:"center", gap:6 }}>
                <span style={{ color:isActive?"#00FF41":"#b0c4b0", fontWeight:isActive?"bold":"normal", fontSize:14 }}>{char.name}</span>
                <span style={{ fontSize:9, letterSpacing:1, color:char.type==="PC"?"#00BFFF":"#FF00FF", border:"1px solid "+(char.type==="PC"?"#00BFFF44":"#FF00FF44"), borderRadius:2, padding:"0 4px" }}>{char.type}</span>
              </div>
              {char.conditions.length > 0 && (
                <div style={{ marginTop:4, display:"flex", flexWrap:"wrap" }}>
                  {char.conditions.map(cond => (
                    <span key={cond.id} style={S.tag(cond.color)}>
                      {cond.name}{cond.duration!==null && <span style={{ opacity:0.7 }}> {cond.duration}</span>}
                      <span onClick={() => removeCondition(char.id, cond.id)} style={{ cursor:"pointer", opacity:0.6, marginLeft:2 }}>{"x"}</span>
                    </span>
                  ))}
                </div>
              )}
            </div>
            {hasHp && (
              <div style={{ display:"flex", flexDirection:"column", alignItems:"center", gap:4, minWidth:110 }}>
                <div style={{ display:"flex", alignItems:"center", gap:4 }}>
                  <button style={S.btnSm("#FF4136")} onClick={() => updateHpDelta(char.id, -1)}>{"−"}</button>
                  {editHp ? (
                    <input autoFocus style={{ ...S.input, width:52, textAlign:"center", fontSize:13, color:hpColor, padding:"2px 4px" }}
                      value={hpVal}
                      onChange={e => setHpVal(e.target.value)}
                      onBlur={commitHp}
                      onKeyDown={e => { if(e.key==="Enter") commitHp(); if(e.key==="Escape") setEditHp(false); }} />
                  ) : (
                    <span onClick={() => { setEditHp(true); setHpVal(String(char.hp??0)); }}
                      style={{ color:hpColor, fontSize:13, minWidth:52, textAlign:"center", fontWeight:"bold", cursor:"pointer", borderBottom:"1px dashed "+hpColor+"44" }}>
                      {char.hp}/{char.maxHp}
                    </span>
                  )}
                  <button style={S.btnSm("#00FF41")} onClick={() => updateHpDelta(char.id, +1)}>{"+"}</button>
                  {emoji && <span style={{ fontSize:18, lineHeight:1, marginLeft:2 }} title={emoji.title}>{emoji.icon}</span>}
                </div>
                <div style={{ width:100, height:4, background:"#1a1a1a", borderRadius:2, overflow:"hidden" }}>
                  <div style={{ width:hpPct+"%", height:"100%", background:hpColor, transition:"all 0.3s" }} />
                </div>
              </div>
            )}
            <div style={{ display:"flex", flexDirection:"column", gap:4 }}>
              <button style={S.btnSm("#00BFFF")} onClick={() => setCondModal(char.id)}>{"⚡"} COND</button>
              <button style={S.btnSm("#FF4136")} onClick={() => removeCharacter(char.id)}>{"✕"}</button>
            </div>
          </div>
        </div>
      );
    }

    /* ══════════════════════════════════════
       CONDITION MODAL
    ══════════════════════════════════════ */
    function ConditionModal({ condModal, setCondModal, characters, condOpts, setCondOpts, customCond, setCustomCond, addCondition, removeCondition }) {
      const char = characters.find(c => c.id === condModal);
      if (!char) return null;
      return (
        <div style={{ position:"fixed", inset:0, background:"#000000cc", display:"flex", alignItems:"center", justifyContent:"center", zIndex:200 }}
          onClick={e => e.target===e.currentTarget && setCondModal(null)}>
          <div style={{ background:"#0d1520", border:"1px solid #00BFFF55", borderRadius:8, padding:24, width:380, maxWidth:"95vw" }}>
            <div style={{ display:"flex", justifyContent:"space-between", alignItems:"center", marginBottom:16 }}>
              <h3 style={{ color:"#00BFFF", margin:0, fontSize:13, letterSpacing:2 }}>{"⚡"} CONDICIONES — {char.name}</h3>
              <button style={S.btnSm("#4a5a4a")} onClick={() => setCondModal(null)}>{"✕"}</button>
            </div>
            <div style={{ display:"flex", gap:10, marginBottom:12 }}>
              <div style={{ flex:1 }}>
                <div style={{ color:"#4a5a4a", fontSize:10, letterSpacing:1, marginBottom:4 }}>DURACION (0 = inf)</div>
                <input style={{ ...S.input, width:"100%" }} type="number" min="0" value={condOpts.duration}
                  onChange={e => setCondOpts(o => ({...o, duration:e.target.value}))} />
              </div>
              <div style={{ flex:1 }}>
                <div style={{ color:"#4a5a4a", fontSize:10, letterSpacing:1, marginBottom:4 }}>REDUCE AL...</div>
                <select style={{ ...S.select, width:"100%" }} value={condOpts.reducesAt}
                  onChange={e => setCondOpts(o => ({...o, reducesAt:e.target.value}))}>
                  <option value="start">Inicio de turno</option>
                  <option value="end">Final de turno</option>
                </select>
              </div>
            </div>
            <div style={{ color:"#4a5a4a", fontSize:10, letterSpacing:1, marginBottom:6 }}>CONDICIONES PRESET</div>
            <div style={{ display:"flex", flexWrap:"wrap", gap:6, marginBottom:14 }}>
              {PRESET_CONDITIONS.map(def => {
                const active = char.conditions.find(c => c.name === def.name);
                return (
                  <button key={def.name}
                    style={{ ...S.btn(def.color), fontSize:11, padding:"3px 8px", background:active?(def.color+"22"):"transparent" }}
                    onClick={() => active ? removeCondition(char.id, active.id) : addCondition(char.id, def)}>
                    {active ? "✓ " : ""}{def.name}
                  </button>
                );
              })}
            </div>
            <div style={{ color:"#4a5a4a", fontSize:10, letterSpacing:1, marginBottom:6 }}>CONDICION PERSONALIZADA</div>
            <div style={{ display:"flex", gap:8 }}>
              <input style={{ ...S.input, flex:1 }} placeholder="Nombre condicion..." value={customCond.name}
                onChange={e => setCustomCond(c => ({...c, name:e.target.value}))} />
              <input type="color" value={customCond.color}
                onChange={e => setCustomCond(c => ({...c, color:e.target.value}))}
                style={{ width:34, height:34, border:"none", borderRadius:3, background:"none", cursor:"pointer", padding:0 }} />
              <button style={S.btn("#00BFFF")}
                onClick={() => { if(!customCond.name.trim()) return; addCondition(char.id, customCond); setCustomCond({name:"",color:"#00FF41"}); }}>
                + ADD
              </button>
            </div>
          </div>
        </div>
      );
    }

    /* ══════════════════════════════════════
       GM VIEW
    ══════════════════════════════════════ */
    function GMView() {
      const [characters,   setCharacters]   = useState([]);
      const [activeCharId, setActiveCharId] = useState(null);
      const [round,        setRound]        = useState(1);
      const [form,         setForm]         = useState({ name:"", type:"PC", initiative:"", hp:"10" });
      const [condModal,    setCondModal]    = useState(null);
      const [condOpts,     setCondOpts]     = useState({ duration:"1", reducesAt:"end" });
      const [customCond,   setCustomCond]   = useState({ name:"", color:"#00FF41" });

      const sorted     = useMemo(() => [...characters].sort((a,b) => b.initiative-a.initiative), [characters]);
      const activeChar = sorted.find(c => c.id === activeCharId) || null;

      /* Merge player-side changes (initiative, hp, maxHp) */
      useEffect(() => {
        const onStorage = (e) => {
          if (e.key !== LS_KEY) return;
          const fresh = loadState();
          if (!fresh || !fresh.characters) return;
          setCharacters(prev => {
            let changed = false;
            const merged = prev.map(c => {
              const fc = fresh.characters.find(x => x.id === c.id);
              if (!fc) return c;
              if (fc.initiative !== c.initiative || fc.hp !== c.hp || fc.maxHp !== c.maxHp) {
                changed = true;
                return { ...c, initiative:fc.initiative, hp:fc.hp, maxHp:fc.maxHp };
              }
              return c;
            });
            return changed ? merged : prev;
          });
        };
        window.addEventListener("storage", onStorage);
        return () => window.removeEventListener("storage", onStorage);
      }, []);

      useEffect(() => { saveState({ characters, activeCharId, round }); }, [characters, activeCharId, round]);

      useEffect(() => {
        if (activeCharId && !characters.find(c => c.id === activeCharId)) {
          setActiveCharId(sorted[0] ? sorted[0].id : null);
        }
      }, [characters]);

      useEffect(() => {
        if (!activeCharId && sorted.length > 0) setActiveCharId(sorted[0].id);
      }, [sorted.length]);

      const addCharacter = () => {
        if (!form.name.trim()) return;
        const c = makeCharacter(form.name, form.type, form.initiative, form.hp);
        setCharacters(p => [...p, c]);
        setForm(f => ({...f, name:"", initiative:""}));
      };

      const removeCharacter = (id) => {
        setCharacters(p => p.filter(c => c.id !== id));
        if (id === activeCharId) {
          const idx  = sorted.findIndex(c => c.id === id);
          const next = sorted[idx+1] || sorted[idx-1] || null;
          setActiveCharId(next ? next.id : null);
        }
      };

      const updateChar     = (id, patch) => setCharacters(p => p.map(c => c.id===id ? {...c,...patch} : c));
      const updateHpDelta  = (id, d)     => setCharacters(p => p.map(c => c.id===id ? {...c, hp:Math.max(0,(c.hp??0)+d)} : c));
      const updateHpDirect = (id, val)   => setCharacters(p => p.map(c => c.id===id ? {...c, hp:Math.max(0,Math.min(c.maxHp??val,val))} : c));

      const processConditions = (charId, timing) => {
        setCharacters(p => p.map(c => {
          if (c.id !== charId) return c;
          const updated = c.conditions
            .map(cond => cond.reducesAt===timing && cond.duration!==null ? {...cond,duration:cond.duration-1} : cond)
            .filter(cond => cond.duration===null || cond.duration>0);
          return {...c, conditions:updated};
        }));
      };

      const nextTurn = () => {
        if (!sorted.length) return;
        const cur = [...characters].sort((a,b) => b.initiative-a.initiative);
        const idx = cur.findIndex(c => c.id === activeCharId);
        if (idx !== -1) processConditions(activeCharId, "end");
        const nextIdx  = (idx + 1) % cur.length;
        const nextChar = cur[nextIdx];
        if (nextIdx === 0) setRound(r => r+1);
        setActiveCharId(nextChar.id);
        setTimeout(() => processConditions(nextChar.id, "start"), 0);
      };

      const prevTurn = () => {
        if (!sorted.length) return;
        const cur = [...characters].sort((a,b) => b.initiative-a.initiative);
        const idx  = cur.findIndex(c => c.id === activeCharId);
        const prev = idx <= 0 ? cur.length-1 : idx-1;
        setActiveCharId(cur[prev].id);
      };

      const resetTracker = () => {
        setRound(1);
        const s = [...characters].sort((a,b) => b.initiative-a.initiative);
        setActiveCharId(s[0] ? s[0].id : null);
        setCharacters(p => p.map(c => ({...c, conditions:[]})));
      };

      const addCondition = (charId, def) => {
        const dur  = condOpts.duration===""||condOpts.duration==="0" ? null : Number(condOpts.duration);
        const cond = makeCondition(def.name, def.color, dur===null?0:dur, condOpts.reducesAt);
        setCharacters(p => p.map(c => {
          if (c.id !== charId) return c;
          if (c.conditions.find(cc => cc.name===def.name)) return c;
          return {...c, conditions:[...c.conditions, cond]};
        }));
      };

      const removeCondition = (charId, condId) =>
        setCharacters(p => p.map(c => c.id!==charId ? c : {...c, conditions:c.conditions.filter(cc => cc.id!==condId)}));

      const openPlayerView = () => window.open(window.location.href.split("?")[0]+"?view=player", "_blank");

      return (
        <div style={{ minHeight:"100vh", background:"#080b0f", color:"#b0c4b0", fontFamily:"'Courier New',monospace", fontSize:14, paddingBottom:60 }}>

          <header style={{ background:"#050709", borderBottom:"1px solid #00FF4133", padding:"14px 24px", display:IN_IFRAME?"none":"flex", alignItems:"center", justifyContent:"space-between", position:"sticky", top:0, zIndex:100 }}>
            <h1 style={{ color:"#00FF41", fontSize:20, fontWeight:"bold", letterSpacing:4, margin:0 }}>{"◈"} CARBON 2185 // DJ</h1>
            <div style={{ display:"flex", alignItems:"center", gap:10 }}>
              {activeChar && <span style={{ color:"#00FF41", fontSize:11, letterSpacing:1 }}>{"▶"} {activeChar.name}</span>}
              <span style={{ background:"#0a1a0a", border:"1px solid #00FF4155", borderRadius:4, padding:"4px 12px", color:"#00FF41", fontSize:12, letterSpacing:2 }}>RONDA {String(round).padStart(3,"0")}</span>
              <button style={{ ...S.btn("#FF00FF"), fontSize:11, padding:"5px 14px" }} onClick={openPlayerView}>{"📺"} VISTA JUGADORES</button>
            </div>
          </header>

          <div style={{ maxWidth:900, margin:"0 auto", padding:"20px 16px", display:"grid", gridTemplateColumns:"1fr 320px", gap:20 }}>

            <div>
              <div style={{ ...S.card, display:"flex", gap:10, alignItems:"center" }}>
                <button style={{ ...S.btn("#00FF41"), fontSize:14, padding:"8px 24px", flex:1 }} onClick={nextTurn} disabled={!sorted.length}>{"▶"} SIGUIENTE TURNO</button>
                <button style={S.btn("#4a5a4a")} onClick={prevTurn} disabled={!sorted.length}>{"◄"}</button>
                <button style={S.btn("#FF8C00")} onClick={resetTracker}>{"↺"} RESET</button>
              </div>
              <div style={S.card}>
                <div style={S.sec}>&mdash; ORDEN DE INICIATIVA &mdash;</div>
                {sorted.length === 0 ? (
                  <div style={{ color:"#4a5a4a", textAlign:"center", padding:"20px 0", fontSize:12, letterSpacing:2 }}>[ SIN COMBATIENTES ]</div>
                ) : sorted.map((char, i) => (
                  <CharRow key={char.id} char={char} isActive={char.id===activeCharId} rank={i}
                    updateChar={updateChar} updateHpDelta={updateHpDelta} updateHpDirect={updateHpDirect}
                    removeCharacter={removeCharacter} removeCondition={removeCondition} setCondModal={setCondModal} />
                ))}
              </div>
            </div>

            <div>
              <div style={S.card}>
                <div style={S.sec}>&mdash; ANADIR COMBATIENTE &mdash;</div>
                <div style={{ marginBottom:8 }}>
                  <div style={{ color:"#4a5a4a", fontSize:10, letterSpacing:1, marginBottom:4 }}>NOMBRE</div>
                  <input style={S.input} placeholder="Nombre del personaje..." value={form.name}
                    onChange={e => setForm(f => ({...f,name:e.target.value}))}
                    onKeyDown={e => e.key==="Enter" && addCharacter()} />
                </div>
                <div style={{ display:"grid", gridTemplateColumns:"1fr 1fr", gap:8, marginBottom:8 }}>
                  <div>
                    <div style={{ color:"#4a5a4a", fontSize:10, letterSpacing:1, marginBottom:4 }}>TIPO</div>
                    <select style={{ ...S.select, width:"100%" }} value={form.type} onChange={e => setForm(f => ({...f,type:e.target.value}))}>
                      <option value="PC">PJ (Jugador)</option>
                      <option value="NPC">PNJ (Enemigo)</option>
                    </select>
                  </div>
                  <div>
                    <div style={{ color:"#4a5a4a", fontSize:10, letterSpacing:1, marginBottom:4 }}>INICIATIVA</div>
                    <input style={S.input} type="number" placeholder="0" value={form.initiative}
                      onChange={e => setForm(f => ({...f,initiative:e.target.value}))} />
                  </div>
                </div>
                {form.type==="NPC" && (
                  <div style={{ marginBottom:8 }}>
                    <div style={{ color:"#4a5a4a", fontSize:10, letterSpacing:1, marginBottom:4 }}>PUNTOS DE SALUD</div>
                    <input style={S.input} type="number" placeholder="10" value={form.hp}
                      onChange={e => setForm(f => ({...f,hp:e.target.value}))} />
                  </div>
                )}
                <button style={{ ...S.btn("#00BFFF"), width:"100%", padding:"8px", fontSize:12, letterSpacing:1 }} onClick={addCharacter}>+ ANADIR AL COMBATE</button>
              </div>

              <div style={{ ...S.card, borderColor:"#FF00FF33" }}>
                <div style={{ ...S.sec, color:"#FF00FF" }}>&mdash; VISTA JUGADORES &mdash;</div>
                <div style={{ color:"#4a5a4a", fontSize:11, lineHeight:1.7, marginBottom:12 }}>
                  Abre la pantalla de jugadores. Cada jugador elige su PJ e ingresa iniciativa y HP.
                </div>
                <button style={{ ...S.btn("#FF00FF"), width:"100%", padding:"7px", fontSize:11 }} onClick={openPlayerView}>{"📺"} ABRIR VISTA JUGADORES</button>
              </div>

              <div style={S.card}>
                <div style={S.sec}>&mdash; CONDICIONES ACTIVAS &mdash;</div>
                {characters.every(c => c.conditions.length===0) ? (
                  <div style={{ color:"#4a5a4a", fontSize:11, letterSpacing:1 }}>[ NINGUNA ]</div>
                ) : characters.filter(c => c.conditions.length>0).map(char => (
                  <div key={char.id} style={{ marginBottom:8 }}>
                    <div style={{ color:char.type==="PC"?"#00BFFF":"#FF00FF", fontSize:11, marginBottom:3 }}>{char.name}</div>
                    <div style={{ display:"flex", flexWrap:"wrap" }}>
                      {char.conditions.map(cond => (
                        <span key={cond.id} style={S.tag(cond.color)}>
                          {cond.name}{cond.duration!==null && <span style={{ opacity:0.6 }}> ({cond.duration}t)</span>}
                        </span>
                      ))}
                    </div>
                  </div>
                ))}
              </div>
            </div>

          </div>

          {condModal && <ConditionModal condModal={condModal} setCondModal={setCondModal}
            characters={characters} condOpts={condOpts} setCondOpts={setCondOpts}
            customCond={customCond} setCustomCond={setCustomCond}
            addCondition={addCondition} removeCondition={removeCondition} />}
        </div>
      );
    }

    function App() { return IS_PLAYER ? <PlayerView /> : <GMView />; }
    ReactDOM.createRoot(document.getElementById("root")).render(<App />);
  </script>
</body>
</html>
