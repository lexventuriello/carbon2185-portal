<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Carbon 2185 — Portal</title>
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<style>
@import url('https://fonts.googleapis.com/css2?family=Share+Tech+Mono&family=Orbitron:wght@400;700;900&family=Rajdhani:wght@400;500;600;700&display=swap');
*{box-sizing:border-box;margin:0;padding:0}
:root{
  --c1:#0077aa;--c2:#cc2244;--c3:#996600;
  --bg:#f4f2ee;--bg2:#ffffff;--bg3:#eeecea;
  --border:#c8c4bc;--text:#1a1814;--muted:#7a756c;
  --font-mono:'Share Tech Mono',monospace;--font-head:'Orbitron',sans-serif;--font-main:'Rajdhani',sans-serif;
}
body{background:var(--bg);font-family:var(--font-main);color:var(--text);min-height:100vh;display:flex;flex-direction:column;align-items:center;justify-content:center;padding:20px}
.logo{font-family:var(--font-head);font-size:32px;font-weight:900;color:var(--c1);letter-spacing:4px;text-align:center;margin-bottom:4px}
.logo span{color:var(--c2)}
.subtitle{font-family:var(--font-mono);font-size:10px;color:var(--muted);letter-spacing:4px;text-align:center;margin-bottom:40px}
.card{background:var(--bg2);border:1px solid var(--border);padding:32px;width:100%;max-width:380px;position:relative}
.card::before{content:'';position:absolute;top:0;left:0;width:4px;height:100%;background:var(--c1)}
.tabs{display:flex;margin-bottom:24px;border-bottom:1px solid var(--border)}
.tab{flex:1;font-family:var(--font-mono);font-size:11px;letter-spacing:2px;padding:8px;text-align:center;cursor:pointer;color:var(--muted);border-bottom:2px solid transparent;margin-bottom:-1px;transition:.2s}
.tab.active{color:var(--c1);border-bottom-color:var(--c1)}
.panel{display:none}.panel.active{display:block}
label{font-family:var(--font-mono);font-size:10px;color:var(--muted);letter-spacing:1px;display:block;margin-bottom:4px}
input{background:var(--bg3);border:1px solid var(--border);color:var(--text);font-family:var(--font-mono);font-size:13px;padding:8px 12px;width:100%;outline:none;margin-bottom:16px;transition:.2s}
input:focus{border-color:var(--c1);background:#fff}
.btn{background:var(--c1);color:#fff;font-family:var(--font-mono);font-size:12px;letter-spacing:2px;padding:10px;width:100%;border:none;cursor:pointer;transition:.2s;margin-top:4px}
.btn:hover{background:#005d88}
.btn:disabled{opacity:.5;cursor:not-allowed}
.btn.secondary{background:transparent;color:var(--c1);border:1px solid var(--c1)}
.btn.secondary:hover{background:rgba(0,119,170,.08)}
.msg{font-family:var(--font-mono);font-size:11px;padding:8px 12px;margin-top:12px;display:none}
.msg.error{background:rgba(204,34,68,.08);color:var(--c2);border:1px solid rgba(204,34,68,.2)}
.msg.success{background:rgba(0,119,170,.08);color:var(--c1);border:1px solid rgba(0,119,170,.2)}
.msg.show{display:block}
.corner{position:absolute;width:8px;height:8px;border-color:var(--c1);border-style:solid;opacity:.5}
.tl{top:-1px;left:-1px;border-width:2px 0 0 2px}
.tr{top:-1px;right:-1px;border-width:2px 2px 0 0}
.bl{bottom:-1px;left:-1px;border-width:0 0 2px 2px}
.br{bottom:-1px;right:-1px;border-width:0 2px 2px 0}
.footer{font-family:var(--font-mono);font-size:9px;color:var(--muted);text-align:center;margin-top:20px;letter-spacing:2px}
</style>
</head>
<body>
<div class="logo">CARBON <span>2185</span></div>
<div class="subtitle">// CYBERPUNK RPG — PORTAL DE JUGADORES</div>

<div class="card">
  <div class="corner tl"></div><div class="corner tr"></div>
  <div class="corner bl"></div><div class="corner br"></div>
  <div class="tabs">
    <div class="tab active" onclick="switchTab('login')">ACCEDER</div>
    <div class="tab" onclick="switchTab('register')">REGISTRARSE</div>
  </div>

  <div id="panel-login" class="panel active">
    <label>EMAIL</label>
    <input type="email" id="login-email" placeholder="tu@email.com">
    <label>CONTRASEÑA</label>
    <input type="password" id="login-pass" placeholder="••••••••">
    <button class="btn" onclick="login()">// INICIAR SESIÓN</button>
    <div class="msg" id="login-msg"></div>
  </div>

  <div id="panel-register" class="panel">
    <label>EMAIL</label>
    <input type="email" id="reg-email" placeholder="tu@email.com">
    <label>CONTRASEÑA</label>
    <input type="password" id="reg-pass" placeholder="mínimo 6 caracteres">
    <label>NOMBRE DEL PERSONAJE</label>
    <input type="text" id="reg-name" placeholder="Identificación en el sistema">
    <button class="btn" onclick="register()">// CREAR CUENTA</button>
    <div class="msg" id="reg-msg"></div>
  </div>
</div>

<div class="footer">© 2019 DRAGON TURTLE GAMES — PORTAL NO OFICIAL</div>

<script>
const SUPABASE_URL = 'https://zgzueeoxnqmzpdzofhxx.supabase.co'
const SUPABASE_KEY = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6InpnenVlZW94bnFtenBkem9maHh4Iiwicm9sZSI6ImFub24iLCJpYXQiOjE3Nzc5ODI4NjIsImV4cCI6MjA5MzU1ODg2Mn0.PF_TKkSEuY7pAdW5T3E7Yk3h_ApkB_dEWua4e33VqJw'
const sb = supabase.createClient(SUPABASE_URL, SUPABASE_KEY)

function switchTab(t){
  document.querySelectorAll('.tab').forEach((el,i)=>el.classList.toggle('active',['login','register'][i]===t))
  document.querySelectorAll('.panel').forEach(p=>p.classList.remove('active'))
  document.getElementById('panel-'+t).classList.add('active')
}

function showMsg(id,text,type){
  const el=document.getElementById(id)
  el.textContent=text
  el.className='msg '+type+' show'
}

async function login(){
  const email=document.getElementById('login-email').value.trim()
  const pass=document.getElementById('login-pass').value
  if(!email||!pass)return showMsg('login-msg','Completá todos los campos','error')
  const btn=document.querySelector('#panel-login .btn')
  btn.disabled=true;btn.textContent='// CONECTANDO...'
  const {error}=await sb.auth.signInWithPassword({email,password:pass})
  if(error){showMsg('login-msg',error.message,'error');btn.disabled=false;btn.textContent='// INICIAR SESIÓN'}
  else window.location.href='hoja.html'
}

async function register(){
  const email=document.getElementById('reg-email').value.trim()
  const pass=document.getElementById('reg-pass').value
  const name=document.getElementById('reg-name').value.trim()
  if(!email||!pass||!name)return showMsg('reg-msg','Completá todos los campos','error')
  const btn=document.querySelector('#panel-register .btn')
  btn.disabled=true;btn.textContent='// REGISTRANDO...'
  const {data,error}=await sb.auth.signUp({email,password:pass})
  if(error){showMsg('reg-msg',error.message,'error');btn.disabled=false;btn.textContent='// CREAR CUENTA';return}
  const user=data.user
  await sb.from('personajes').insert({user_id:user.id,datos:{nombre:name},updated_at:new Date()})
  showMsg('reg-msg','¡Cuenta creada! Revisá tu email para confirmar.','success')
  btn.disabled=false;btn.textContent='// CREAR CUENTA'
}

async function checkSession(){
  const {data:{session}}=await sb.auth.getSession()
  if(session)window.location.href='hoja.html'
}
checkSession()
</script>
</body>
</html>
